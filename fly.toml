app = "central-pessoal"
primary_region = "gig" # Netherlands - nearest to Brazil (change to your preferred region)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3456
  force_https = true
  auto_stop_machines = false  # never sleep
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "central_data"
  destination = "/data"
  auto_delete_machine_volume = false
